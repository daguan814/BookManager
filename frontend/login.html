<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BookManager 登录</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:"Microsoft YaHei","PingFang SC",sans-serif;background:linear-gradient(130deg,#0d1f38,#153f5c)}
    .card{width:min(420px,92vw);padding:24px;border-radius:14px;background:rgba(255,255,255,.94);box-shadow:0 16px 40px rgba(0,0,0,.28)}
    h1{margin:0 0 8px;font-size:28px;color:#12253f}p{margin:0 0 14px;color:#4f657f}label{display:block;margin:0 0 6px;color:#27415f}
    input{width:100%;height:42px;padding:0 12px;border:1px solid #c7d6ea;border-radius:10px;font-size:16px}
    button{margin-top:12px;width:100%;height:42px;border:1px solid #1f74dc;border-radius:10px;background:#1f74dc;color:#fff;font-size:15px;cursor:pointer}
    .err{margin-top:10px;color:#b32020;min-height:20px}
  </style>
</head>
<body>
  <main class="card">
    <h1>BookManager</h1>
    <p>请输入访问密码进入系统</p>
    <label for="pwd">密码</label>
    <input id="pwd" type="password" autocomplete="off" />
    <button id="loginBtn" type="button">进入系统</button>
    <div id="err" class="err"></div>
  </main>
  <script src="./login.js?v=20260302a"></script>
</body>
</html>
